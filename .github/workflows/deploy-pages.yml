name: Deploy Weird CUA dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export static dashboard
        run: >-
          python benchmarks/weird_captcha_gym/dashboard/export_static.py
          --output _site

      - name: Verify standalone export
        run: |
          test -f _site/index.html
          test -f _site/data/catalog.json
          test -f _site/manifest.json
          test -f _site/play/index.html
          test -f _site/play/runtime/browser_adapter.js
          test -f _site/play/runtime/grader_worker.js
          test ! -e _site/survey
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("_site/manifest.json").read_text())
          catalog = json.loads(Path("_site/data/catalog.json").read_text())
          assert manifest["survey_included"] is False
          assert manifest["catalog"] == {
              "total": 75,
              "built": 75,
              "solution_videos": 75,
          }
          assert manifest["browser_play"] == {
              "enabled": True,
              "environments": 75,
              "challenges": 300,
              "challenges_per_environment": 4,
              "grader_files": 69,
              "python_runtime": "pyodide@314.0.2",
          }
          assert len(catalog["capabilities"]) == 7
          assert sum(item["primary_count"] for item in catalog["capabilities"]) == 75
          assert all(
              environment["capability"]["status"] == "working_annotation"
              for environment in catalog["environments"]
              if environment["stage"] == "built"
          )
          challenges = sorted(Path("_site/play/challenges").glob("*.json"))
          assert len(challenges) == 75
          for path in challenges:
              bundle = json.loads(path.read_text())
              assert len(bundle["challenges"]) == 4, path
              assert len({item["ground_truth"]["challenge_id"] for item in bundle["challenges"]}) == 4, path
              assert (Path("_site/play") / bundle["grader"]).is_file(), path
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
