<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0c0b">
    <meta name="description" content="Visual environment hub and launch control plane for CAPTCHA Bench.">
    <title>CAPTCHA Bench · Interaction Observatory</title>
    <link rel="stylesheet" href="static/styles.css">
  </head>
  <body>
    <div class="app-frame">
      <aside class="sidebar" aria-label="Primary navigation">
        <a class="brand" href="#/observatory" aria-label="CAPTCHA Bench home">
          <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
          <span class="brand-type"><b>CAPTCHA</b><em>BENCH</em></span>
        </a>

        <nav class="primary-nav">
          <p class="nav-label">FIELD STATION</p>
          <a href="#/observatory" data-nav="observatory">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13.5 12 4l8 9.5v6a1 1 0 0 1-1 1h-4.5v-5h-5v5H5a1 1 0 0 1-1-1z"/></svg>
            <span>Observatory</span>
          </a>
          <a href="#/environments" data-nav="environments">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 8 4.5v9L12 21l-8-4.5v-9zm0 0v18M4 7.5l8 4.5 8-4.5"/></svg>
            <span>Environments</span>
            <b class="nav-count" id="nav-environment-count">—</b>
          </a>
          <a href="#/reviews" data-nav="reviews">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10v3H7zM5 6h14v15H5z"/><path d="m8 14 2.5 2.5L16 11"/></svg>
            <span>Review queue</span>
            <b class="nav-count nav-review-count" id="nav-review-count">—</b>
          </a>
          <a href="#/sessions" data-nav="sessions">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="1"/><path d="m8 21 1.5-4h5L16 21M7 9l2 2-2 2m4 0h4"/></svg>
            <span>Live sessions</span>
            <b class="nav-live" id="nav-session-count">0</b>
          </a>
          <a href="#/evaluations" data-nav="evaluations">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V9m5 10V4m5 15v-7m5 7V7"/></svg>
            <span>Evaluations</span>
          </a>
        </nav>

        <button class="sidebar-note companion-status" type="button" data-action="open-companion" aria-label="Local companion status">
          <span class="pulse-dot"></span>
          <div><small id="runner-kicker">LOCAL RUNNER</small><strong id="runner-name">detecting</strong></div>
        </button>

        <div class="sidebar-links">
          <a href="media/docs/interaction-puzzle-field-notes.md" target="_blank" rel="noreferrer">Field notes ↗</a>
          <a href="media/README.md" target="_blank" rel="noreferrer">Benchmark README ↗</a>
        </div>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <button class="mobile-nav-toggle" type="button" aria-label="Toggle navigation">
            <span></span><span></span>
          </button>
          <div class="breadcrumb" id="breadcrumb"><span>WEIRD CAPTCHA GYM</span><b>OBSERVATORY</b></div>
          <div class="topbar-actions">
            <button class="command-button" id="global-search-button" type="button"><kbd>⌘</kbd><kbd>K</kbd><span>Find an environment</span></button>
            <button class="button button-acid button-small" type="button" data-action="open-launch-picker"><span>Launch</span><b>↗</b></button>
          </div>
        </header>

        <main id="app" tabindex="-1" aria-live="polite">
          <section class="loading-screen">
            <div class="loading-orbit"><i></i><i></i><i></i></div>
            <p>Cataloguing strange machines…</p>
          </section>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>
    <div class="toast-stack" id="toast-stack" aria-live="assertive"></div>

    <template id="icon-template">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </template>
    <script src="static/config.js"></script>
    <script src="static/app.js" defer></script>
  </body>
</html>
